version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: llm-logger-db
    environment:
      POSTGRES_USER: llm_user
      POSTGRES_PASSWORD: llm_password
      POSTGRES_DB: llm_logger
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/init.sql:/docker-entrypoint-initdb.d/02-init.sql
    ports:
      - "5432:5432"
    networks:
      - llm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: llm-logger-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - llm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-logger-backend
    environment:
      DATABASE_URL: postgresql://llm_user:llm_password@postgres:5432/llm_logger
      REDIS_URL: redis://redis:6379
      INGESTION_URL: http://ingestion:8001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - llm-network
    volumes:
      - ./backend:/app

  # Ingestion Service
  ingestion:
    build:
      context: ./backend
      dockerfile: Dockerfile.ingestion
    container_name: llm-logger-ingestion
    environment:
      DATABASE_URL: postgresql://llm_user:llm_password@postgres:5432/llm_logger
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: ${ENVIRONMENT}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - llm-network
    volumes:
      - ./backend:/app

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-logger-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_INGESTION_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - llm-network
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
  redis_data:

networks:
  llm-network:
    driver: bridge
